<section class="card form-card"><h1>新人骑行指南</h1><p class="hint">面向第一次参加社团骑行的同学。</p><h2>出发前准备</h2><ul><li>头盔必须佩戴，夜骑建议配前后灯。</li><li>准备水壶、简易补给（能量胶/香蕉/面包）。</li><li>检查刹车、胎压、变速是否正常。</li></ul><h2>活动当日建议</h2><ul><li>提前 10 分钟集合，听完路线与安全说明。</li><li>不单独脱队；如不适及时示意领骑或收队。</li><li>下坡控速、路口减速，遵守交通规则。</li></ul><h2>进阶路线选择</h2><ul><li>入门：20-30km 平路为主。</li><li>进阶：30-50km，增加爬升。</li><li>挑战：50km+，需稳定体能与补给策略。</li></ul></section>
