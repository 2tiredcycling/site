<section class="card form-card site-nav-shell">
  {% set ep = request.endpoint or '' %}
  <nav class="site-nav">
    <a class="quick-pill {% if ep.endswith('.index') %}is-active{% endif %}" href="{{ url_for('web.index') }}" {% if ep.endswith('.index') %}aria-current="page"{% endif %}>
      <span class="home-icon-badge"><svg class="home-icon-svg"><use href="#i-home"></use></svg></span><span>首页</span>
    </a>
    <a class="quick-pill {% if ep.endswith('.about_page') %}is-active{% endif %}" href="{{ url_for('web.about_page') }}" {% if ep.endswith('.about_page') %}aria-current="page"{% endif %}>
      <span class="home-icon-badge"><svg class="home-icon-svg"><use href="#i-book"></use></svg></span><span>社团介绍</span>
    </a>
    <a class="quick-pill {% if ep.endswith('.events_list') or ep.endswith('.events_detail') or ep.endswith('.activity_list') or ep.endswith('.activity_detail') or ep.endswith('.event_signup') or ep.endswith('.event_signup_success') %}is-active{% endif %}" href="{{ url_for('web.events_list') }}" {% if ep.endswith('.events_list') or ep.endswith('.events_detail') or ep.endswith('.activity_list') or ep.endswith('.activity_detail') or ep.endswith('.event_signup') or ep.endswith('.event_signup_success') %}aria-current="page"{% endif %}>
      <span class="home-icon-badge"><svg class="home-icon-svg"><use href="#i-bike"></use></svg></span><span>活动</span>
    </a>
    <a class="quick-pill {% if ep.endswith('.kit_preorder_list') or ep.endswith('.kit_preorder_detail') or ep.endswith('.kit_preorder_success') or ep.endswith('.kit_preorder_lookup') or ep.endswith('.kit_preorder_global_lookup') %}is-active{% endif %}" href="{{ url_for('web.kit_preorder_list') }}" {% if ep.endswith('.kit_preorder_list') or ep.endswith('.kit_preorder_detail') or ep.endswith('.kit_preorder_success') or ep.endswith('.kit_preorder_lookup') or ep.endswith('.kit_preorder_global_lookup') %}aria-current="page"{% endif %}>
      <span class="home-icon-badge"><svg class="home-icon-svg"><use href="#i-pen"></use></svg></span><span>骑行服预定</span>
    </a>
    <a class="quick-pill {% if ep.endswith('.routes_center') or ep.endswith('.route_detail') %}is-active{% endif %}" href="{{ url_for('web.routes_center') }}" {% if ep.endswith('.routes_center') or ep.endswith('.route_detail') %}aria-current="page"{% endif %}>
      <span class="home-icon-badge"><svg class="home-icon-svg"><use href="#i-map"></use></svg></span><span>路线</span>
    </a>
    <a class="quick-pill {% if ep.endswith('.site_feedback') %}is-active{% endif %}" href="{{ url_for('web.site_feedback', source=request.path) }}" {% if ep.endswith('.site_feedback') %}aria-current="page"{% endif %}>
      <span class="home-icon-badge"><svg class="home-icon-svg"><use href="#i-pen"></use></svg></span><span>反馈</span>
    </a>
    <a class="quick-pill {% if ep.endswith('.contact_page') %}is-active{% endif %}" href="{{ url_for('web.contact_page') }}" {% if ep.endswith('.contact_page') %}aria-current="page"{% endif %}>
      <span class="home-icon-badge"><svg class="home-icon-svg"><use href="#i-mail"></use></svg></span><span>联系</span>
    </a>
    {% set member_user = current_member_user() %}
    {% if member_user %}
      <a class="quick-pill {% if ep.endswith('.member_account') or ep.endswith('.member_password') %}is-active{% endif %}" href="{{ url_for('web.member_account') }}" {% if ep.endswith('.member_account') or ep.endswith('.member_password') %}aria-current="page"{% endif %}>
        <span class="home-icon-badge"><svg class="home-icon-svg"><use href="#i-user"></use></svg></span><span>{{ member_user.nickname or member_user.student_id }}</span>
      </a>
    {% else %}
      <a class="quick-pill {% if ep.endswith('.member_login') or ep.endswith('.member_register') %}is-active{% endif %}" href="{{ url_for('web.member_login', next=request.path) }}" {% if ep.endswith('.member_login') or ep.endswith('.member_register') %}aria-current="page"{% endif %}>
        <span class="home-icon-badge"><svg class="home-icon-svg"><use href="#i-user"></use></svg></span><span>登录</span>
      </a>
    {% endif %}
    <button class="quick-pill quick-pill-button theme-entry-link theme-nav-pill" type="button" aria-label="切换主题面板">
      <span class="home-icon-badge"><svg class="home-icon-svg"><use href="#i-palette"></use></svg></span><span>主题</span>
    </button>
  </nav>
</section>
