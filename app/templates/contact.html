<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系我们 | 2Tired 骑行社</title>
  <meta name="description" content="{{ meta_description or '联系 2Tired 骑行社。' }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container narrow">
    <section class="card form-card">
      <div class="row-actions">
        <a class="btn btn-muted" href="{{ url_for('web.index') }}"><span aria-hidden="true">🏠</span><span>返回首页</span></a>
        <a class="btn" href="{{ url_for('web.site_feedback', source=url_for('web.contact_page')) }}"><span aria-hidden="true">📝</span><span>提交反馈</span></a>
      </div>
      <h1>{{ page.title if page else '联系我们' }}</h1>
      {% if page and page.summary %}
        <p class="hint">{{ page.summary }}</p>
      {% endif %}

      {% if page and page.content %}
        <div class="rich-text">{{ page.content | e | replace('\n', '<br>') | safe }}</div>
      {% else %}
        <div class="edit-item">
          <p><strong>社团邮箱：</strong><a href="mailto:st_2tiredcc@link.cuhk.edu.cn">st_2tiredcc@link.cuhk.edu.cn</a></p>
        </div>
      {% endif %}
    </section>
  </main>
  <script src="{{ url_for('static', filename='theme-switcher.js') }}"></script>
</body>
</html>
