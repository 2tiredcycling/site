server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20m;

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /manage/\nAllow: /\n";
    }

    location = /wordpress/wp-admin/setup-config.php { return 403; }
    location = /wp-admin/setup-config.php { return 403; }
    location = /wp-login.php { return 403; }
    location = /xmlrpc.php { return 403; }
    location = /phpmyadmin { return 403; }
    location = /.env { return 403; }
    location = /.git/config { return 403; }

    location ~* ^/(?:wp-admin|wp-login\.php|wordpress|xmlrpc\.php|phpmyadmin|pma|\.git|\.env|vendor|cgi-bin|HNAP1) {
        return 403;
    }

    location ~* \.(?:php|asp|aspx|jsp|bak|sql|tar\.gz|zip)$ {
        return 403;
    }

    location / {
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
