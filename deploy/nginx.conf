upstream web_upstream {
    server web:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    keepalive_timeout 65;

    client_max_body_size 20m;
    sendfile on;
    tcp_nopush on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /manage/\nAllow: /\n";
    }

    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    location = /wordpress/wp-admin/setup-config.php { return 403; }
    location = /wp-admin/setup-config.php { return 403; }
    location = /wp-login.php { return 403; }
    location = /xmlrpc.php { return 403; }
    location = /phpmyadmin { return 403; }
    location = /.env { return 403; }
    location = /.git/config { return 403; }

    location ~* ^/(?:wp-admin|wp-login\.php|wordpress|xmlrpc\.php|phpmyadmin|pma|\.git|\.env|vendor|cgi-bin|HNAP1) {
        return 403;
    }

    location ~* \.(?:php|asp|aspx|jsp|bak|sql|tar\.gz|zip)$ {
        return 403;
    }

    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_buffer_size 16k;
    }
}
